            type: array
      tags:
      - regulations
    post:
      consumes:
      - application/json
      description: Create a new item (clausul) for a regulation
      parameters:
      - description: Regulation ID
        in: path
        name: id
        required: true
        type: string
      - description: Item Data
        in: body
        name: item
        required: true
        schema:
