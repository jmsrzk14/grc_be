      tags:
      - regulations
  /api/v1/regulations/{id}/items:
    get:
      description: Get a list of all items (clausul) for a specific regulation
      parameters:
      - description: Regulation ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
