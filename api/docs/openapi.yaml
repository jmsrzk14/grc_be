          description: Created
          schema:
            $ref: '#/definitions/internal_service.RegulationItemResponse'
      tags:
      - regulations
  /api/v1/regulations/{id}/items/{item_id}:
    delete:
      description: Delete a regulation item by ID
      parameters:
      - description: Regulation ID
        in: path
        name: id
        required: true
        type: string
      - description: Item ID
        in: path
        name: item_id
        required: true
        type: string
