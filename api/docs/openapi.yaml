info:
  contact: {}
  description: API documentation for Governance, Risk, and Compliance system.
  title: GRC API
  version: "1.0"
paths:
  /api/v1/assessments/sessions:
    get:
      description: Get a list of all assessment sessions, optionally filtered by tenant_id
      parameters:
      - description: Tenant ID Filter
        in: query
        name: tenant_id
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/internal_service.SessionResponse'
            type: array
      tags:
      - assessments
    post:
      consumes:
      - application/json
      description: Create a new assessment session for a tenant
      parameters:
      - description: Session Data
        in: body
        name: session
        required: true
        schema:
          $ref: '#/definitions/internal_service.CreateSessionRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_service.SessionResponse'
      tags:
      - assessments
  /api/v1/assessments/sessions/{id}:
    delete:
      description: Delete an assessment session by ID
      parameters:
      - description: Session ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      tags:
      - assessments
    get:
      description: Get a specific assessment session details
      parameters:
      - description: Session ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_service.SessionResponse'
      tags:
      - assessments
    put:
      consumes:
      - application/json
      description: Update an existing assessment session
      parameters:
      - description: Session ID
        in: path
        name: id
        required: true
        type: string
      - description: Updated Data
        in: body
        name: session
        required: true
        schema:
          $ref: '#/definitions/internal_service.CreateSessionRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_service.SessionResponse'
      tags:
      - assessments
  /api/v1/assessments/sessions/{id}/results:
    get:
      description: Get all compliance results for a specific assessment session
      parameters:
      - description: Session ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/internal_service.ResultResponse'
            type: array
      tags:
      - assessments
    post:
      consumes:
      - application/json
      description: Submit or update a compliance result for a specific regulation
        item
      parameters:
      - description: Session ID
        in: path
        name: id
        required: true
        type: string
      - description: Result Data
        in: body
        name: result
        required: true
        schema:
          $ref: '#/definitions/internal_service.SubmitResultRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_service.ResultResponse'
      tags:
      - assessments
  /api/v1/assessments/sessions/{id}/results/{result_id}:
    delete:
      description: Delete an assessment result by ID
      parameters:
      - description: Session ID
        in: path
        name: id
        required: true
        type: string
      - description: Result ID
        in: path
        name: result_id
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      tags:
      - assessments
  /api/v1/assessments/sessions/{id}/summaries:
    get:
      description: Get a summary of assessment results grouped by regulation
      parameters:
      - description: Session ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/grc_be_internal_biz.RegulationAssessment'
            type: array
      tags:
      - assessments
  /api/v1/properties:
    get:
      description: Get a list of all properties
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/internal_service.PropertyResponse'
            type: array
      tags:
      - properties
    post:
      consumes:
      - application/json
      description: Create a new property/asset
      parameters:
      - description: Property Data
        in: body
        name: property
        required: true
        schema:
          $ref: '#/definitions/internal_service.CreatePropertyRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_service.PropertyResponse'
      tags:
      - properties
  /api/v1/properties/{id}:
    delete:
      description: Delete a property by ID
      parameters:
      - description: Property ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      tags:
      - properties
    get:
      description: Get a specific property details
      parameters:
      - description: Property ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_service.PropertyResponse'
      tags:
      - properties
    put:
      consumes:
      - application/json
      description: Update an existing property
      parameters:
      - description: Property ID
        in: path
        name: id
        required: true
        type: string
      - description: Updated Data
        in: body
        name: property
        required: true
        schema:
          $ref: '#/definitions/internal_service.CreatePropertyRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_service.PropertyResponse'
      tags:
      - properties
  /api/v1/regulations:
    get:
      description: Get a list of all regulations
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
